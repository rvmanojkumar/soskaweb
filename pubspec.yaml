name: soska_frontend
description: Soskali Lifestyles Ecommerce Application
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # Networking
  dio: ^5.4.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  hive_flutter: ^1.1.0
  
  # UI Components
  carousel_slider: ^5.0.0
  cached_network_image: ^3.3.1
  flutter_rating_bar: ^4.0.1
  shimmer: ^3.0.0
  badges: ^3.1.2
  flutter_svg: ^2.0.9
  google_fonts: ^6.1.0
  
  # Payment Gateway
  razorpay_flutter: ^1.3.6
  
  # Social Sharing
  share_plus: ^10.1.2
  url_launcher: ^6.3.0
  
  # Utilities
  intl: ^0.19.0
  connectivity_plus: ^6.0.3
  fluttertoast: ^8.2.5
  
  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/